<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOAD - Select Gender</title>
    <meta name="description" content="Select your gender to personalize your LOAD fitness experience.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/profile-setup.css">
</head>

<body>
    <div class="bg-glow">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="profile-screen">
        <div class="brand-mark">
            <span class="brand-text">LOAD</span><span class="brand-dot">.</span>
        </div>

        <!-- Step Indicator: 1 of 3 -->
        <div class="step-indicator">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <!-- Title -->
        <div class="title-section">
            <h1 class="slide-title">What's your gender<span class="accent-dot">?</span></h1>
            <p class="slide-subtitle">This helps us personalize your fitness experience</p>
        </div>

        <!-- Gender Cards -->
        <div class="gender-options">
            <div class="gender-card" data-gender="male">
                <div class="gender-icon">♂</div>
                <div class="gender-info">
                    <span class="gender-label">Male</span>
                </div>
                <div class="gender-radio"></div>
            </div>
            <div class="gender-card" data-gender="female">
                <div class="gender-icon">♀</div>
                <div class="gender-info">
                    <span class="gender-label">Female</span>
                </div>
                <div class="gender-radio"></div>
            </div>
            <div class="gender-card" data-gender="other">
                <div class="gender-icon">⚧</div>
                <div class="gender-info">
                    <span class="gender-label">Other</span>
                </div>
                <div class="gender-radio"></div>
            </div>
        </div>

        <!-- CTA -->
        <div class="cta-section">
            <button id="continue-btn" class="continue-btn" type="button" disabled>
                Continue
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
            <button id="back-btn" class="back-btn" type="button">Back</button>
        </div>
    </div>

    <script src="../js/profile-gender.js"></script>
</body>

</html>
