<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOAD - Weight & Height</title>
    <meta name="description" content="Enter your weight and height to personalize your LOAD fitness metrics.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/profile-setup.css">
</head>

<body>
    <div class="bg-glow">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="profile-screen">
        <div class="brand-mark">
            <span class="brand-text">LOAD</span><span class="brand-dot">.</span>
        </div>

        <!-- Step Indicator: 2 of 3 -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
        </div>

        <!-- Title -->
        <div class="title-section">
            <h1 class="slide-title">Your body metrics<span class="accent-dot">.</span></h1>
            <p class="slide-subtitle">We use this to calculate accurate fitness data</p>
        </div>

        <!-- Weight & Height Inputs -->
        <div class="form-section">
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label" for="weight-input">Weight</label>
                    <div class="input-wrapper">
                        <input id="weight-input" class="input-field" type="number" placeholder="65" min="20" max="300"
                            inputmode="decimal">
                        <span class="input-unit">kg</span>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label" for="height-input">Height</label>
                    <div class="input-wrapper">
                        <input id="height-input" class="input-field" type="number" placeholder="170" min="50" max="300"
                            inputmode="decimal">
                        <span class="input-unit">cm</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- CTA -->
        <div class="cta-section">
            <button id="continue-btn" class="continue-btn" type="button" disabled>
                Continue
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
            <button id="back-btn" class="back-btn" type="button">Back</button>
        </div>
    </div>

    <script src="../js/profile-body.js"></script>
</body>

</html>
