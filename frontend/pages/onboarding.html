<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOAD - Get Started</title>
    <meta name="description" content="Get started with LOAD — redefine human limits.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/onboarding.css">
</head>

<body>
    <!-- Subtle animated background -->
    <div class="bg-glow">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="onboarding-screen">
        <!-- Top brand mark -->
        <div class="brand-mark">
            <span class="brand-text">LOAD</span><span class="brand-dot">.</span>
        </div>

        <!-- Hero statement -->
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="line line-1">READY TO</span>
                <span class="line line-2">REDEFINE</span>
                <span class="line line-3">HUMAN</span>
                <span class="line line-4">LIMITS<span class="accent-mark">?</span></span>
            </h1>
        </div>

        <!-- Get Started button -->
        <div class="cta-section">
            <button id="get-started-btn" class="get-started-btn" type="button">
                Get Started
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
            <p class="cta-hint">Tap to begin your journey</p>
        </div>
    </div>

    <script src="../js/onboarding.js"></script>
</body>

</html>
