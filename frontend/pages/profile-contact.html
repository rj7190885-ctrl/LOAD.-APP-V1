<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOAD - Your Profile</title>
    <meta name="description" content="Set up your username and contact info for your LOAD profile.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/profile-setup.css">
</head>

<body>
    <div class="bg-glow">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="profile-screen">
        <div class="brand-mark">
            <span class="brand-text">LOAD</span><span class="brand-dot">.</span>
        </div>

        <!-- Step Indicator: 3 of 3 -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
        </div>

        <!-- Title -->
        <div class="title-section">
            <h1 class="slide-title">Almost there<span class="accent-dot">.</span></h1>
            <p class="slide-subtitle">Set up your profile to get started</p>
        </div>

        <!-- Username & Mobile Inputs -->
        <div class="form-section">
            <div class="input-group">
                <label class="input-label" for="username-input">Username</label>
                <div class="input-wrapper">
                    <input id="username-input" class="input-field" type="text" placeholder="john_doe" maxlength="30"
                        autocomplete="username" spellcheck="false">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="mobile-input">
                    Mobile Number <span class="optional-tag">(optional)</span>
                </label>
                <div class="input-wrapper">
                    <input id="mobile-input" class="input-field" type="tel" placeholder="+91 98765 43210" maxlength="15"
                        inputmode="tel" autocomplete="tel">
                </div>
            </div>
        </div>

        <!-- CTA -->
        <div class="cta-section">
            <button id="finish-btn" class="continue-btn" type="button" disabled>
                Finish Setup
                <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17l-5-5" />
                </svg>
            </button>
            <button id="back-btn" class="back-btn" type="button">Back</button>
        </div>
    </div>

    <script src="../js/profile-contact.js"></script>
</body>

</html>
