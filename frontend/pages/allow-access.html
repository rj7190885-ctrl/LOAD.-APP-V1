<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOAD - Allow Access</title>
    <meta name="description" content="Allow LOAD to access your Google Fit data to sync your fitness metrics.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/allow-access.css">
</head>

<body>
    <!-- Subtle background glow -->
    <div class="bg-glow">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="access-screen">
        <!-- Top brand mark -->
        <div class="brand-mark">
            <span class="brand-text">LOAD</span><span class="brand-dot">.</span>
        </div>

        <!-- Shield Icon -->
        <div class="icon-section">
            <div class="shield-icon-container">
                <svg class="shield-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4 5.5V11.5C4 16.45 7.4 21.05 12 22C16.6 21.05 20 16.45 20 11.5V5.5L12 2Z"
                        fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"
                        stroke-linejoin="round" />
                    <path d="M9 12L11 14L15 10" stroke="#34A853" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </div>

        <!-- Access Message -->
        <div class="message-section">
            <h1 class="access-title">Allow Access</h1>
            <p class="access-description">
                LOAD needs permission to read your Google Fit data to track steps, heart rate, and workouts<span
                    class="accent-dot">.</span>
            </p>
        </div>

        <!-- Permission List -->
        <div class="permissions-section">
            <div class="permission-item">
                <div class="permission-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                    </svg>
                </div>
                <div class="permission-text">
                    <span class="permission-label">Activity & Steps</span>
                    <span class="permission-desc">Daily step count and activity data</span>
                </div>
            </div>
            <div class="permission-item">
                <div class="permission-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EA4335" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                </div>
                <div class="permission-text">
                    <span class="permission-label">Heart Rate</span>
                    <span class="permission-desc">Real-time and resting heart rate</span>
                </div>
            </div>
            <div class="permission-item">
                <div class="permission-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FBBC04" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                </div>
                <div class="permission-text">
                    <span class="permission-label">Workouts</span>
                    <span class="permission-desc">Exercise sessions and duration</span>
                </div>
            </div>
        </div>

        <!-- CTA Buttons -->
        <div class="cta-section">
            <button id="allow-btn" class="allow-btn" type="button">
                Allow Access
                <svg class="btn-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17l-5-5" />
                </svg>
            </button>
            <button id="deny-btn" class="deny-btn" type="button">Not now</button>
        </div>
    </div>

    <script src="../js/allow-access.js"></script>
</body>

</html>
